independent_vowels:

  - name: AI
    glyph: AI
    unicode: "0x11010"
    compose: [EE, WEE]
    # VS applied to WEE after ccmp decomposition — see signs.WEE

  - name: I
    glyph: I
    unicode: "0x11007"
    variants:
      - { glyph: I.1, label: I.1, vs: 1 }
      - { glyph: I.2, label: I.2, vs: 2 }

  - name: E
    glyph: E
    unicode: "0x11071"
    compose: [EE, PULLI]
    # VS applies to PULLI after ccmp decomposition — see signs.PULLI

  - name: O
    glyph: O
    unicode: "0x11072"
    compose: [OO, PULLI]
    # VS applies to PULLI after ccmp decomposition — see signs.PULLI

signs:

  - name: pulli
    glyph: PULLI
    unicode: "0x11070"
    variants:
      - { glyph: PULLI.top,    label: top,    vs: 1 }
      - { glyph: PULLI.left,   label: left,   vs: 2 }
      - { glyph: PULLI.left.1, label: left.1, vs: 3 }
      - { glyph: PULLI.inside, label: inside, vs: 4 }

  - name: "ā"    # ā
    glyph: WAA
    unicode: "0x11038"
    variants:
      - { glyph: WAA.protr.alt, label: "protr.", vs: 1, after: "@mid_alt_cons_ae" }
    contextual:
      - WAA.mid
      - WAA.mid.mid.alt

  - name: "i"
    glyph: WI
    unicode: "0x1103A"
    variants:
      - { glyph: WI.protr.alt,      label: "protr.",      vs: 1, after: "@mid_alt_cons_ae" }
      - { glyph: WI.stub.protr.alt, label: "stub.protr.", vs: 2, after: "@stubi" }
    contextual:
      - WI.stub
      - WI.stub.mid
      - WI.mid.mid.alt

  - name: "ī"    # ī
    glyph: WII
    unicode: "0x1103B"
    variants:
      - { glyph: WII.protr.alt,      label: "protr.",      vs: 1, after: "@mid_alt_cons_ae" }
      - { glyph: WII.stub.protr.alt, label: "stub.protr.", vs: 2, after: "@stubi" }
    contextual:
      - WII.stub
      - WII.stub.mid
      - WII.mid.mid.allt    # note: typo in current font glyph name

  - name: "u"
    glyph: WU
    unicode: "0x1103C"
    variants:
      - { glyph: WU.protr.alt, label: "protr.", vs: 1, after: "@mid_alt_cons_u" }
    contextual:
      - WU.vert.mid
      - WU.vert.corner
      - WU.vert.corner.alt
      - WU.vert.corner.1.alt
      - WU.horiz.long1
      - WU.horiz.long1.protr.alt
      - WU.horiz.long2
      - WU.horiz.long2.protr.alt
      - WU.1.longka

  - name: "ū"    # ū
    glyph: WUU
    unicode: "0x1103D"
    variants:
      - { glyph: WUU.protr.alt, label: "protr.",  vs: 1, after: "@mid_alt_cons_u" }
      - { glyph: WUU.mid.alt.1, label: "mid.alt", vs: 2, after: [LLLA] }
    contextual:
      - WUU.vert.mid
      - WUU.vert.corner
      - WUU.vert.corner.alt
      - WUU.vert.corner.1.alt
      - WUU.vert.corner.alt.1
      - WUU.hor.long.bot
      - WUU.hor.long.bot.protr.alt
      - WUU.hor.long.top1
      - WUU.hor.long.top1.protr.alt
      - WUU.hor.long.top2
      - WUU.hor.long.top2.protr.alt
      - WUU.hor.long.top3
      - WUU.hor.long.top3.protr.alt
      - WUU.hor.long.top4
      - WUU.hor.long.top4.protr.alt

  - name: "ĕ"    # ĕ (Tamil Brahmi short e)
    glyph: WE
    unicode: "0x11073"
    variants:
      - { glyph: WE.protr.alt,           label: "protr.",           vs: 1 }
      - { glyph: WE.pulli.top.alt,       label: "pulli.top",        vs: 2 }
      - { glyph: WE.pulli.top.protr.alt, label: "pulli.top.protr.", vs: 3 }
    contextual:
      - WE.mid
      - WE.mid.pulli.top.alt

  - name: "e"
    glyph: WEE
    unicode: "0x11042"
    variants:
      - { glyph: WEE.protr.alt, label: "protr.", vs: 1 }
    contextual:
      - WEE.mid

  - name: "ai"
    glyph: WAI
    unicode: "0x11043"
    variants:
      - { glyph: WAI.protr.alt, label: "protr.", vs: 1 }
    contextual:
      - WAI.mid

  - name: "ŏ"    # ŏ (Tamil Brahmi short o)
    glyph: WO
    unicode: "0x11074"
    variants:
      - { glyph: WO.protr.alt,               label: "protr.",              vs: 1 }
      - { glyph: WO.pulli.top.alt,           label: "pulli.top",           vs: 2 }
      - { glyph: WO.pulli.top.protr.alt,     label: "pulli.top.protr.",    vs: 3 }
      - { glyph: WO.inv.alt,                 label: "inv",                 vs: 4 }
      - { glyph: WO.inv.protr.alt,           label: "inv.protr.",          vs: 5 }
      - { glyph: WO.inv.pulli.top.alt,       label: "inv.pulli.top",       vs: 6 }
      - { glyph: WO.inv.pulli.top.protr.alt, label: "inv.pulli.top.protr.", vs: 7 }

  - name: "o"
    glyph: WOO
    unicode: "0x11044"
    variants:
      - { glyph: WOO.inv.alt,      label: "inv",        vs: 1 }
      - { glyph: WOO.protr.alt,    label: "protr.",     vs: 2 }
      - { glyph: WOO.inv.protr.alt, label: "inv.protr.", vs: 3 }

  - name: "au"
    glyph: WAU
    unicode: "0x11045"
    variants:
      - { glyph: WAU.protr.alt, label: "protr.", vs: 1 }
ligatures:

  - name: JAA
    glyph: JAA
