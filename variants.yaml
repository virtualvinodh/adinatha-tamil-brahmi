# variants.yaml — Adinatha Tamil Brahmi glyph variant registry
# See yaml.md for schema documentation.
# After editing, run:  python gen_features.py  then  build.bat

consonants:

  - name: A
    glyph: A
    unicode: "0x11005"
    syllable: false
    variants:
      - { glyph: A.1, label: A.1, vs: 1 }
      - { glyph: A.2, label: A.2, vs: 2 }

  - name: AA
