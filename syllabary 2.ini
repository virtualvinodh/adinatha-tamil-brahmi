<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stroke-Only Hollow SVG Demo</title>
<script src="https://unpkg.com/clipper-lib@6.4.2/clipper.js"></script>
<script src="https://unpkg.com/imagetracerjs/imagetracer_v1.2.8.min.js"></script>
</head>
<body>
<h2>Upload an image (letter “p”, “o”, etc.)</h2>
<input type="file" id="fileInput" accept="image/*"/>
<div id="svgContainer" style="margin-top:20px;"></div>

<script>
const fileInput = document.getElementById('fileInput');
const svgContainer = document.getElementById('svgContainer');

fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const dataUrl = ev.target.result;
        const svgStr = await traceImageToStrokeSVG(dataUrl, 2);
        svgContainer.innerHTML = svgStr;
    };
    reader.readAsDataURL(file);
});

async function traceImageToStrokeSVG(imageSrc, strokeWidth) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => {
            const canvas = document.createElement('canvas');
            canvas.width = img.width;
            canvas.height = img.height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0);

            ImageTracer.imageToSVG(canvas.toDataURL(), async (svgStr) => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(svgStr, "image/svg+xml");
                const paths = Array.from(doc.querySelectorAll('path'));

                const scale = 1000; // scale for Clipper
                const offset = strokeWidth * scale / 2;
                const clipperPaths = [];

                paths.forEach(p => {
                    const d = p.getAttribute('d');
                    if (!d) return;
                    const pts = [];
                    const commands = d.match(/[ML][^ML]+/g);
                    if (!commands) return;
                    commands.forEach(cmd => {
                        const coords = cmd.slice(1).trim().split(/[ ,]+/).map(Number);
                        pts.push({X: coords[0]*scale, Y: coords[1]*scale});
                    });
                    clipperPaths.push(pts);
                });

                const co = new ClipperLib.ClipperOffset();
                co.AddPaths(clipperPaths, ClipperLib.JoinType.jtMiter, ClipperLib.EndType.etClosedPolygon);
                const solution = [];
                co.Execute(solution, offset);

                // convert to SVG path
                let finalPath = '';
                solution.forEach(poly => {
                    if (!poly.length) return;
                    finalPath += `M${poly[0].X/scale},${poly[0].Y/scale} `;
                    for (let i=1;i<poly.length;i++){
                        finalPath += `L${poly[i].X/scale},${poly[i].Y/scale} `;
                    }
                    finalPath += 'Z ';
                });

                const newSvg = `<svg width="${img.width}" height="${img.height}" viewBox="0 0 ${img.width} ${img.height}" xmlns="http://www.w3.org/2000/svg">
                    <path d="${finalPath}" fill="none" stroke="#000" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>`;

                resolve(newSvg);
            }, {ltres:1, qtres:1, pathomit:8, numberofcolors:2, colorquantcycles:3});
        };
        img.onerror = () => reject("Image load failed");
        img.src = imageSrc;
    });
}
</script>
</body>
</html>
